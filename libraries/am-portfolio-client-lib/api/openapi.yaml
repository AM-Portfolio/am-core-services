openapi: 3.0.1
info:
  contact:
    email: portfolio-team@example.com
    name: Portfolio Team
  description: API documentation for the Asset Management Portfolio application
  license:
    name: Private
    url: https://example.com
  title: Portfolio Management API
  version: v1.0
servers:
- description: Generated server url
  url: http://localhost:8101
tags:
- description: Advanced analytics endpoints for portfolio data
  name: Portfolio Analytics
- description: Endpoints for retrieving market index data
  name: Market Indices
- description: Endpoints for managing user portfolios
  name: Portfolio Management
- description: Advanced analytics endpoints for market indices data
  name: Index Analytics
paths:
  /api/v1/analytics/portfolio/{portfolioId}/advanced:
    post:
      description: Retrieves comprehensive analytics for a portfolio with customizable
        components and timeframes
      operationId: getAdvancedAnalytics
      parameters:
      - explode: false
        in: path
        name: portfolioId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvancedAnalyticsRequest"
        required: true
      responses:
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdvancedAnalyticsResponse"
          description: Portfolio not found
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdvancedAnalyticsResponse"
          description: Invalid request parameters
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvancedAnalyticsResponse"
          description: Analytics data retrieved successfully
      summary: Get advanced portfolio analytics
      tags:
      - Portfolio Analytics
      x-content-type: application/json
      x-accepts:
      - '*/*'
      - application/json
  /api/v1/analytics/index/{indexSymbol}/advanced:
    post:
      description: Retrieves comprehensive analytics for a market index with customizable
        components and timeframes
      operationId: getAdvancedAnalytics_1
      parameters:
      - explode: false
        in: path
        name: indexSymbol
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvancedAnalyticsRequest"
        required: true
      responses:
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdvancedAnalyticsResponse"
          description: Index not found
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdvancedAnalyticsResponse"
          description: Invalid request parameters
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvancedAnalyticsResponse"
          description: Analytics data retrieved successfully
      summary: Get advanced index analytics
      tags:
      - Index Analytics
      x-content-type: application/json
      x-accepts:
      - '*/*'
      - application/json
  /api/v1/portfolios:
    get:
      description: Retrieves all portfolios associated with a specific user ID
      operationId: getPortfolios
      parameters:
      - description: User ID to fetch portfolios for
        explode: true
        in: query
        name: userId
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            '*/*':
              schema:
                items:
                  $ref: "#/components/schemas/PortfolioModelV1"
                type: array
          description: List of portfolios retrieved successfully
        "404":
          content:
            '*/*':
              schema:
                items:
                  $ref: "#/components/schemas/PortfolioModelV1"
                type: array
          description: No portfolios found for user
      summary: Get all portfolios for user
      tags:
      - Portfolio Management
      x-accepts:
      - '*/*'
  /api/v1/portfolios/{portfolioId}:
    get:
      description: Retrieves detailed portfolio information for a specific portfolio
        ID
      operationId: getPortfolioById
      parameters:
      - description: Portfolio ID (UUID format)
        explode: false
        in: path
        name: portfolioId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PortfolioModelV1"
          description: Portfolio not found
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioModelV1"
          description: Portfolio found
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PortfolioModelV1"
          description: Invalid portfolio ID format
      summary: Get portfolio by ID
      tags:
      - Portfolio Management
      x-accepts:
      - '*/*'
      - application/json
  /api/v1/portfolios/summary:
    get:
      description: Retrieves a summary of all portfolios for a user with performance
        metrics. Optionally filter by specific portfolio ID.
      operationId: getPortfolioSummary
      parameters:
      - description: User ID to fetch portfolio summary for
        explode: true
        in: query
        name: userId
        required: true
        schema:
          type: string
        style: form
      - description: Optional portfolio ID to filter results for specific portfolio
        explode: true
        in: query
        name: portfolioId
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          format: int32
          type: integer
        style: form
      - explode: true
        in: query
        name: size
        required: false
        schema:
          format: int32
          type: integer
        style: form
      - explode: true
        in: query
        name: interval
        required: false
        schema:
          type: string
        style: form
      responses:
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PortfolioSummaryV1"
          description: No portfolio summary found for user
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PortfolioSummaryV1"
          description: Portfolio summary retrieved successfully
      summary: Get portfolio summary
      tags:
      - Portfolio Management
      x-accepts:
      - '*/*'
  /api/v1/portfolios/list:
    get:
      description: Retrieves a lightweight list of portfolio IDs and names for all
        user portfolios
      operationId: getPortfolioBasicDetails
      parameters:
      - description: User ID to fetch portfolio basic details for
        explode: true
        in: query
        name: userId
        required: true
        schema:
          type: string
        style: form
      responses:
        "404":
          content:
            '*/*':
              schema:
                items:
                  $ref: "#/components/schemas/PortfolioBasicInfo"
                type: array
          description: No portfolios found for user
        "200":
          content:
            '*/*':
              schema:
                items:
                  $ref: "#/components/schemas/PortfolioBasicInfo"
                type: array
          description: Portfolio list retrieved successfully
      summary: Get portfolio IDs and names
      tags:
      - Portfolio Management
      x-accepts:
      - '*/*'
  /api/v1/portfolios/holdings:
    get:
      description: Retrieves all holdings across portfolios for a user with current
        values. Optionally filter by specific portfolio ID.
      operationId: getPortfolioHoldings
      parameters:
      - description: User ID to fetch portfolio holdings for
        explode: true
        in: query
        name: userId
        required: true
        schema:
          type: string
        style: form
      - description: Optional portfolio ID to filter results for specific portfolio
        explode: true
        in: query
        name: portfolioId
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          format: int32
          type: integer
        style: form
      - explode: true
        in: query
        name: size
        required: false
        schema:
          format: int32
          type: integer
        style: form
      - explode: true
        in: query
        name: interval
        required: false
        schema:
          type: string
        style: form
      responses:
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PortfolioHoldings"
          description: No holdings found for user
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PortfolioHoldings"
          description: Portfolio holdings retrieved successfully
      summary: Get portfolio holdings
      tags:
      - Portfolio Management
      x-accepts:
      - '*/*'
  /api/v1/market-index/all:
    get:
      description: Retrieves all market indices with optional filtering by interval
        and type
      operationId: getAllMarketIndices
      parameters:
      - explode: true
        in: query
        name: interval
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: type
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexIndices"
          description: Market indices retrieved successfully
        "404":
          content:
            '*/*':
              schema:
                items:
                  $ref: "#/components/schemas/IndexIndices"
                type: array
          description: No market indices found
        "400":
          content:
            '*/*':
              schema:
                items:
                  $ref: "#/components/schemas/IndexIndices"
                type: array
          description: Invalid interval parameter
      summary: Get all market indices
      tags:
      - Market Indices
      x-accepts:
      - '*/*'
      - application/json
components:
  schemas:
    AdvancedAnalyticsRequest:
      example:
        fromDate: 2000-01-23
        coreIdentifiers:
          indexSymbol: indexSymbol
          portfolioId: portfolioId
          comparisonIndexSymbol: comparisonIndexSymbol
        pagination:
          sortDirection: sortDirection
          size: 6
          returnAllData: true
          sortBy: sortBy
          page: 0
        featureConfiguration:
          moversLimit: 1
        toDate: 2000-01-23
        timeFrameRequest:
          fromDate: 2000-01-23
          toDate: 2000-01-23
          timeFrame: 1m
        featureToggles:
          includeMovers: true
          includeSectorAllocation: true
          includeHeatmap: true
          includeMarketCapAllocation: true
        timeFrame: 1m
      properties:
        fromDate:
          format: date
          type: string
        toDate:
          format: date
          type: string
        timeFrame:
          enum:
          - 1m
          - 3m
          - 5m
          - 10m
          - 15m
          - 30m
          - 1H
          - 4H
          - 1D
          - 1W
          - 1M
          - 1Y
          type: string
        coreIdentifiers:
          $ref: "#/components/schemas/CoreIdentifiers"
        pagination:
          $ref: "#/components/schemas/PaginationRequest"
        featureToggles:
          $ref: "#/components/schemas/FeatureToggles"
        featureConfiguration:
          $ref: "#/components/schemas/FeatureConfiguration"
        timeFrameRequest:
          $ref: "#/components/schemas/TimeFrameRequest"
      type: object
    CoreIdentifiers:
      example:
        indexSymbol: indexSymbol
        portfolioId: portfolioId
        comparisonIndexSymbol: comparisonIndexSymbol
      properties:
        portfolioId:
          type: string
        indexSymbol:
          pattern: "^[A-Za-z0-9 ]+$"
          type: string
        comparisonIndexSymbol:
          pattern: "^[A-Za-z0-9 ]*$"
          type: string
      required:
      - portfolioId
      type: object
    FeatureConfiguration:
      example:
        moversLimit: 1
      properties:
        moversLimit:
          format: int32
          minimum: 1
          type: integer
      type: object
    FeatureToggles:
      example:
        includeMovers: true
        includeSectorAllocation: true
        includeHeatmap: true
        includeMarketCapAllocation: true
      properties:
        includeHeatmap:
          type: boolean
        includeMovers:
          type: boolean
        includeSectorAllocation:
          type: boolean
        includeMarketCapAllocation:
          type: boolean
      type: object
    PaginationRequest:
      example:
        sortDirection: sortDirection
        size: 6
        returnAllData: true
        sortBy: sortBy
        page: 0
      properties:
        page:
          format: int32
          type: integer
        size:
          format: int32
          type: integer
        sortBy:
          type: string
        sortDirection:
          type: string
        returnAllData:
          type: boolean
      type: object
    TimeFrameRequest:
      example:
        fromDate: 2000-01-23
        toDate: 2000-01-23
        timeFrame: 1m
      properties:
        fromDate:
          format: date
          type: string
        toDate:
