version: '3.8'

services:
  am-gateway:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: am-gateway
    ports:
      - "${SERVICE_PORT}:${SERVICE_PORT}"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - SPRING_DATA_MONGODB_URI=${SPRING_DATA_MONGODB_URI}
      # Add other necessary env vars here, reusing existing infraom .env automatically matching Spring keys
    networks:
      - am-net
    restart: unless-stopped

networks:
  am-net:
    external: true
    name: am-infra_am-net
