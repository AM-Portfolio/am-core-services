name: AM MCP Server Publish

on:
  push:
    paths:
      - "services/am-mcp-server/**"
      - "libraries/**"
      - "domain/**"
      - "pom.xml"
  pull_request:
    paths:
      - "services/am-mcp-server/**"
      - "libraries/**"
      - "domain/**"
      - "pom.xml"

jobs:
  publish-mcp-server:
    name: Publish MCP Server
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: "java"
      working_directory: "services/am-mcp-server"
      image_name: "am-mcp-server"
      build_context: "."
    secrets: inherit
