name: AM Gateway Publish

on:
  push:
    paths:
      - "services/am-gateway/**"
      - "libraries/**"
      - "domain/**"
      - "pom.xml"
  pull_request:
    paths:
      - "services/am-gateway/**"
      - "libraries/**"
      - "domain/**"
      - "pom.xml"

jobs:
  publish-gateway:
    name: Publish AM Gateway
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@develop
    with:
      language: "java"
      working_directory: "services/am-gateway"
      image_name: "am-gateway"
      build_context: "."
      preprod_namespace: "am-apps-preprod"
      prod_namespace: "am-apps-prod"
      deploy_dev: false
      deploy_prod: true
    secrets: inherit
