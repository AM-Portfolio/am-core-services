name: AM Analysis Service Publish

on:
  push:
    paths:
      - "services/am-analysis/**"
      - "libraries/**"
      - "domain/**"
      - "pom.xml"
  pull_request:
    paths:
      - "services/am-analysis/**"
      - "libraries/**"
      - "domain/**"
      - "pom.xml"

jobs:
  publish-analysis:
    name: Publish Analysis
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@develop
    with:
      language: "java"
      working_directory: "services/am-analysis"
      image_name: "am-analysis"
      build_context: "."
      preprod_namespace: "am-apps-preprod"
      prod_namespace: "am-apps-prod"
      deploy_prod: false
    secrets: inherit
