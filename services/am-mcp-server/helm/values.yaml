## Base values for am-mcp-server service
## All environment-specific overrides go in values.<env>.yaml

replicaCount: 1
port: 8080
language: java

image:
  repository: am-mcp-server

service:
  type: ClusterIP
  port: 8080

# Health probe configuration (Spring Boot Actuator)
probes:
  port: 8080
  liveness:
    path: /actuator/health
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readiness:
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Ingress (disabled by default)
ingress:
  enabled: false
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: am-mcp-server.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Default resource limits (MCP server is lightweight — mostly outbound HTTP)
resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 192Mi

# Vault (disabled by default — enabled in preprod/prod)
vault:
  enabled: false

# Environment label
environment: "default"

# Key application environment variables (non-secret defaults)
# Secrets (auth credentials) are injected by Vault in preprod/prod
env:
  SPRING_PROFILES_ACTIVE: "default"
  AM_AUTH_URL: "http://localhost:8001"
  AM_AI_AGENT_URL: "http://localhost:8100"
  AM_PORTFOLIO_URL: "http://localhost:8060"
  AM_DEFAULT_USER: "user1"
  AM_TOOLS_PORTFOLIO_ENABLED: "true"
  AM_TOOLS_TRADE_ENABLED: "true"
  AM_TOOLS_MARKET_ENABLED: "true"
  AM_TOOLS_ANALYSIS_ENABLED: "true"
  AM_TOOLS_AI_AGENT_ENABLED: "true"
