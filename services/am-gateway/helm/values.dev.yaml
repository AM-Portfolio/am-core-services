# Dev environment overrides for am-gateway
environment: dev

replicaCount: 1

# Minimal resources for shared dev namespace
resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 192Mi

# Vault disabled in dev — env vars used directly
vault:
  enabled: false

# Dev-specific env vars (point to dev cluster services)
env:
  SPRING_PROFILES_ACTIVE: "dev"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.am-infra-dev.svc.cluster.local:9092"
  REDIS_HOST: "redis.am-infra-dev.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
