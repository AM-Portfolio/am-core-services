# Production environment overrides for am-gateway
environment: prod

replicaCount: 2

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

# Ingress enabled with WebSocket-specific annotations
ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: am-gateway.am-portfolio.io
      paths:
        - path: /
          pathType: Prefix

# Vault enabled — injects Kafka and Redis secrets at runtime
vault:
  enabled: true
  role: "am-gateway-role"
  secretPaths:
    kafka: "kv/prod/kafka"
    redis: "kv/prod/database/redis"

# Non-secret env vars
env:
  SPRING_PROFILES_ACTIVE: "prod"
