# Pre-production environment overrides for am-gateway
environment: preprod

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Vault enabled — role and token management now handled centrally
vault:
  enabled: true
  secretPaths:
    kafka: "apps/data/preprod/infra/kafka"
    redis: "apps/data/preprod/infra/redis"

# Non-secret env vars — standard infra URLs are now handled centrally
env:
  SPRING_PROFILES_ACTIVE: "preprod"
