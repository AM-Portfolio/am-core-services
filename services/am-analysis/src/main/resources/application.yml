INFRA_HOST: 100.72.208.15
KAFKA_BOOTSTRAP_SERVERS: localhost:9092
#mongo - connection is configured via environment variable or default below

server:
  port: 8090

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: am-analysis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    trade-topic: ${KAFKA_TRADE_TOPIC:am-trade}
    consumer:
      group-id: am-analysis-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_JAAS_CONFIG:org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="password123";}
  data:
    mongodb:
      uri: ${MONGODB_CONNECTION_URL:mongodb://admin:password123@localhost:27017/analysis?authSource=admin}

logging:
  level:
    root: INFO
    com.am.analysis: DEBUG
    com.am.feign: DEBUG
    am.trade: DEBUG
    com.am.portfolio.client.market.invoker: DEBUG

am:
  analysis:
    adapter:
      market:
        enabled: false # Enable/disable Market Event Listener
      portfolio:
        enabled: false # Enable/disable Portfolio Event Listener
      trade:
        enabled: false # Enable/disable Trade Event Listener
      ingestion:
        enabled: false # Enable/disable Analysis Ingestion Service

  services:
    market-data:
      url: ${MARKET_DATA_URL:http://localhost:8092} # Default to standard port, can be overridden
