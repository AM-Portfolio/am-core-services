# Dev environment overrides for am-analysis
environment: dev

replicaCount: 1

# Minimal resources for shared dev namespace
resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 192Mi

# Vault disabled in dev — env vars used directly
vault:
  enabled: false

# Dev-specific env vars (point to dev cluster services)
env:
  SPRING_PROFILES_ACTIVE: "dev"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.am-infra-dev.svc.cluster.local:9092"
  KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
  MONGODB_CONNECTION_URL: "mongodb://am-mongo.am-infra-dev.svc.cluster.local:27017/analysis"
  MARKET_DATA_URL: "http://am-market-data.am-apps-dev.svc.cluster.local:8092"
