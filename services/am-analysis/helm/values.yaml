## Base values for am-analysis service
## All environment-specific overrides go in values.<env>.yaml

replicaCount: 1
port: 8090
language: java

image:
  repository: am-analysis

service:
  type: ClusterIP
  port: 8090

# Health probe configuration (Spring Boot Actuator)
probes:
  port: 8090
  liveness:
    path: /actuator/health
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readiness:
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Ingress (disabled by default — enabled in prod)
ingress:
  enabled: false
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: am-analysis.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Default resource limits (overridden per environment)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Vault (disabled by default — enabled in preprod/prod via values.<env>.yaml)
vault:
  enabled: false

# Environment label injected into the container as ENVIRONMENT var
environment: "default"

# Key application environment variables (non-secret defaults)
# Secrets (passwords, tokens) are injected by Vault in preprod/prod
env:
  SPRING_PROFILES_ACTIVE: "default"
  MARKET_DATA_URL: "http://am-market-data:8092"
